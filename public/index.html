
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FeatureIQ — AI Backlog Prioritiser</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #08112a;
      --navy-2: #0d1c3d;
      --yellow: #f5c400;
      --white:  #ffffff;
      --gray-1: #f8f9fc;
      --gray-3: #e2e6f0;
      --text:   #0d1830;
      --text-2: #3d4a6b;
      --text-3: #6b7a9a;
      --green:  #16a34a;
      --font:   'Sora', sans-serif;
      --mono:   'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--white);
      font-family: var(--font);
      color: var(--text);
    }

    body {
      display: grid;
      grid-template-rows: 56px 1fr 56px;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: var(--navy);
      border-bottom: 2px solid var(--yellow);
      display: flex;
      align-items: center;
      padding: 0 2.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 28px; height: 28px;
      background: var(--yellow);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; color: var(--navy);
    }

    .logo-name {
      font-size: 14px; font-weight: 700;
      color: var(--white); letter-spacing: -0.02em;
    }

    .logo-name span { color: var(--yellow); }

    /* HERO */
    main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      max-width: 520px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .hero-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .hero-title {
      font-size: 52px;
      font-weight: 800;
      color: var(--navy);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .hero-title span {
      color: var(--yellow);
      position: relative;
      display: inline-block;
    }

    .hero-title span::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 4px;
      height: 3px;
      background: var(--yellow);
      border-radius: 2px;
      opacity: 0.4;
    }

    .hero-sub {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-3);
      line-height: 1.7;
      max-width: 380px;
    }

    .hero-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pill {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--gray-3);
      color: var(--text-3);
      letter-spacing: 0.03em;
      background: var(--gray-1);
    }

    .hero-cta {
      height: 48px;
      padding: 0 32px;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.01em;
      position: relative;
      overflow: hidden;
    }

    .hero-cta::before {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 4px; height: 100%;
      background: var(--yellow);
    }

    .hero-cta:hover {
      background: var(--navy-2);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(8,17,42,0.18);
    }

    .hero-cta-note {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      letter-spacing: 0.03em;
      margin-top: -0.5rem;
    }

    /* FOOTER */
    footer {
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
    }

    .footer-left {
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
    }

    .footer-right {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: rgba(255,255,255,0.25);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-mark">FQ</div>
    <div class="logo-name">Feature<span>IQ</span></div>
  </div>
</nav>

<main>
  <div class="hero">

    <div class="hero-label">AI-Powered Product Intelligence</div>

    <h1 class="hero-title">
      Prioritise smarter.<br>Ship what <span>matters</span>.
    </h1>

    <div class="hero-pills">
      <span class="pill">Priority Scoring</span>
      <span class="pill">Impact vs Effort Matrix</span>
      <span class="pill">Risk Detection</span>
      <span class="pill">Executive Reports</span>
    </div>

    <button class="hero-cta" onclick="window.location.href='app.html'">
      Get Started →
    </button>

    <div class="hero-cta-note">No signup required · Data stays in your session</div>

  </div>
</main>

<footer>
  <div class="footer-left">FeatureIQ v1.0 · Built with Claude API</div>
  <div class="footer-right">
    <div class="status-dot"></div>
    Claude API Active
  </div>
</footer>

</body>
</html>
